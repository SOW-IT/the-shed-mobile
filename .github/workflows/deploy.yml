# Auto-deploys production on every merge to main:
#   1. npx convex deploy  - pushes the backend to the PROD Convex deployment
#   2. Vercel watches GitHub and builds/deploys the web app on its own
#      (configure in Vercel dashboard: build cmd = "npx expo export --platform web",
#       output dir = "dist", env var EXPO_PUBLIC_CONVEX_URL = prod Convex URL)
#
# One-time setup (repo secrets):
#   CONVEX_DEPLOY_KEY - Convex dashboard -> prod deployment -> Settings -> Deploy key
# Until it exists, this workflow passes with a warning and skips deploying.
name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    # A hung step must never block the deploy concurrency queue for the
    # 6-hour GitHub default.
    timeout-minutes: 30
    env:
      CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      # Quality gate: never deploy a broken main.
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Backend tests
        run: npm test

      - name: Deploy secret not configured
        if: env.CONVEX_DEPLOY_KEY == ''
        run: |
          echo "::warning::CONVEX_DEPLOY_KEY secret is not set - skipping the Convex deploy."
          echo "Add it in the repo settings to enable push-to-deploy (see .github/workflows/deploy.yml)."

      - name: Deploy Convex prod
        if: env.CONVEX_DEPLOY_KEY != ''
        run: npx convex deploy
