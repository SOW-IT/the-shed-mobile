# Auto-deploys production on every merge to main:
#   1. npx convex deploy  - pushes the backend to the PROD Convex deployment
#      and runs the web export with EXPO_PUBLIC_CONVEX_URL pointed at it
#   2. vercel deploy      - publishes the export to the-shed-web.vercel.app
#
# One-time setup (repo secrets):
#   CONVEX_DEPLOY_KEY - Convex dashboard -> prod deployment -> Settings -> Deploy key
#   VERCEL_TOKEN      - https://vercel.com/account/tokens
# Until both exist, this workflow passes with a warning and skips deploying.
name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    # A hung step must never block the deploy concurrency queue for the
    # 6-hour GitHub default.
    timeout-minutes: 30
    env:
      CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      # The CLI's telemetry can keep the process alive after the deployment
      # finishes, hanging the job.
      VERCEL_TELEMETRY_DISABLED: "1"
      # Not secrets - just identifiers for the the-shed-web Vercel project.
      VERCEL_ORG_ID: team_BN2cAhJhnaYsx0CBERDsYOeF
      VERCEL_PROJECT_ID: prj_GDhatLychoCm4yRy8b152beusHBE
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      # Quality gate: never deploy a broken main.
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Backend tests
        run: npm test

      - name: Deploy secrets not configured
        if: env.CONVEX_DEPLOY_KEY == '' || env.VERCEL_TOKEN == ''
        run: |
          echo "::warning::CONVEX_DEPLOY_KEY and/or VERCEL_TOKEN secrets are not set - skipping the production deploy."
          echo "Add them in the repo settings to enable push-to-deploy (see .github/workflows/deploy.yml)."

      - name: Deploy Convex prod + export web against it
        if: env.CONVEX_DEPLOY_KEY != '' && env.VERCEL_TOKEN != ''
        run: npx convex deploy --cmd 'npx expo export --platform web' --cmd-url-env-var-name EXPO_PUBLIC_CONVEX_URL

      - name: Publish web to Vercel
        if: env.CONVEX_DEPLOY_KEY != '' && env.VERCEL_TOKEN != ''
        # Uses the Vercel Build Output API (--prebuilt) so Vercel skips its own
        # build step and serves the files we provide directly. Routing is
        # declared in config.json: try static files first, then fall back to
        # index.html so Expo Router handles all client-side navigation.
        timeout-minutes: 10
        run: |
          mkdir -p .vercel/output/static
          cp -r dist/. .vercel/output/static/
          cat > .vercel/output/config.json << 'VERCEL_CONFIG'
          {
            "version": 3,
            "cleanUrls": true,
            "routes": [
              { "handle": "filesystem" },
              { "src": "/(.*)", "dest": "/index.html" }
            ]
          }
          VERCEL_CONFIG
          npx vercel deploy --prebuilt --prod --yes --token "$VERCEL_TOKEN"
