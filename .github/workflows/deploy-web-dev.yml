# Builds the web app against the DEV Convex deployment and publishes it to the
# separate Vercel project `the-shed-web-dev` (https://the-shed-web-dev.vercel.app).
# Auto-deploys on merges to main; can also be run on demand from the Actions tab.
#
# Required repo secrets:
#   VERCEL_TOKEN          - a Vercel access token with deploy rights to the team
#   VERCEL_PROJECT_ID_DEV - the project id of `the-shed-web-dev`
name: Deploy web (dev)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-web-dev-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # Skip (rather than fail) until the secrets are configured, so initial
      # setup or an accidental secret removal doesn't redden every merge to main.
      - name: Check deploy secrets
        id: secrets
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID_DEV: ${{ secrets.VERCEL_PROJECT_ID_DEV }}
        run: |
          if [ -z "$VERCEL_TOKEN" ] || [ -z "$VERCEL_PROJECT_ID_DEV" ]; then
            echo "::warning::VERCEL_TOKEN / VERCEL_PROJECT_ID_DEV not set — skipping dev web deploy."
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.secrets.outputs.configured == 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - if: steps.secrets.outputs.configured == 'true'
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm
      - if: steps.secrets.outputs.configured == 'true'
        run: npm ci
      - name: Build & deploy dev web
        if: steps.secrets.outputs.configured == 'true'
        run: npm run deploy:web:dev
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID_DEV: ${{ secrets.VERCEL_PROJECT_ID_DEV }}
