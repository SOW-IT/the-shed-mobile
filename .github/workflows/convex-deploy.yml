name: Convex Deploy

on:
  # Auto-deploy only on merges to main (prod). Branch/PR pushes do NOT deploy;
  # use the manual workflow_dispatch below for an on-demand preview deploy.
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: convex-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Deploy to Convex
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            npx convex deploy
          else
            npx convex deploy --preview-name "${{ github.ref_name }}"
          fi
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
