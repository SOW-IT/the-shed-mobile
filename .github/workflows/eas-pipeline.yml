# EAS pipeline: build → submit staging → (approval) → submit production
#
# Runs automatically on push to main, or manually from the Actions tab.
# The production submit is gated by a GitHub Environment ("production") with
# required reviewers — configure that at:
#   Settings → Environments → production → Required reviewers
#
# Prerequisites (same as eas-build.yml):
#   - EXPO_TOKEN repo secret
#   - EAS signing credentials configured (npx eas credentials)
#   - A GitHub Environment named "production" with required-reviewer protection
name: EAS Pipeline

# Only checkout is needed; keep the GITHUB_TOKEN read-only.
permissions:
  contents: read

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      platform:
        description: "Platform(s) to build"
        type: choice
        options: [both, ios, android]
        default: both

concurrency:
  group: eas-pipeline-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-staging:
    name: Build & submit → Staging
    runs-on: ubuntu-latest
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Set up EAS
        uses: expo/expo-github-action@eab7a230208c952974db8c3245cfd78402c7b385 # v9
        with:
          eas-version: latest
          token: ${{ env.EXPO_TOKEN }}

      - name: Resolve platform
        run: |
          platform="${{ inputs.platform || 'both' }}"
          [ "$platform" = "both" ] && platform="all"
          echo "EAS_PLATFORM=$platform" >> "$GITHUB_ENV"

      # Waits for the build to complete before this job finishes, so the
      # production job only starts after staging is confirmed built + submitted.
      - name: Build & submit to staging
        run: eas build --platform "${{ env.EAS_PLATFORM }}" --profile staging --non-interactive --auto-submit

  build-production:
    name: Build & submit → Production
    needs: build-staging
    runs-on: ubuntu-latest
    environment: production   # <-- requires approval in GitHub Environment settings
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Set up EAS
        uses: expo/expo-github-action@eab7a230208c952974db8c3245cfd78402c7b385 # v9
        with:
          eas-version: latest
          token: ${{ env.EXPO_TOKEN }}

      - name: Resolve platform
        run: |
          platform="${{ inputs.platform || 'both' }}"
          [ "$platform" = "both" ] && platform="all"
          echo "EAS_PLATFORM=$platform" >> "$GITHUB_ENV"

      - name: Build & submit to production
        run: eas build --platform "${{ env.EAS_PLATFORM }}" --profile production --non-interactive --auto-submit
