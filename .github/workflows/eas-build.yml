# Builds iOS + Android on EAS whenever main changes.
#
# One-time setup (see README):
#   1. npx eas init                      — links the repo to an EAS project
#   2. npx eas credentials               — set up Apple + Android signing
#   3. Add an EXPO_TOKEN repo secret     — https://expo.dev/accounts/[account]/settings/access-tokens
name: EAS Build

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: eas-build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      # Quality gate: don't queue store builds for a broken main.
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Backend tests
        run: npm test

      - name: EXPO_TOKEN not configured
        if: env.EXPO_TOKEN == ''
        run: |
          echo "::warning::EXPO_TOKEN secret is not set — skipping the EAS build."
          echo "Create an access token at https://expo.dev/settings/access-tokens"
          echo "and add it as the EXPO_TOKEN repository secret to enable iOS/Android builds."

      - name: Set up EAS
        if: env.EXPO_TOKEN != ''
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build iOS + Android
        if: env.EXPO_TOKEN != ''
        run: eas build --platform all --profile production --non-interactive --no-wait
