# EAS builds + submits for iOS + Android.
#
#   - Push to main               -> production build (no store submit)
#   - Manual (workflow_dispatch)  -> pick a profile (preview / production) and
#                                    either build it, or submit its latest build
#
# Preview builds are manual: run this workflow from the Actions tab ("Run
# workflow") with profile = preview. Submitting a build is a separate manual run
# (tick "submit") that you trigger after the build has finished.
#
# One-time setup (see README):
#   1. npx eas init            - links the repo to an EAS project
#   2. npx eas credentials     - set up Apple + Android signing
#   3. Add an EXPO_TOKEN repo secret - https://expo.dev/settings/access-tokens
#      The token's account must have access to this EAS project.
name: EAS Build

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      profile:
        description: "EAS profile"
        type: choice
        options: [preview, production]
        default: preview
      submit:
        description: "Submit the latest build to the stores (instead of building)"
        type: boolean
        default: false

concurrency:
  group: eas-build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build (iOS + Android)
    runs-on: ubuntu-latest
    # The `secrets` context can't be read inside step `if:` conditions (that
    # raises "Unrecognized named-value: 'secrets'"), so surface the token as a
    # job-level env var that both the conditions and the EAS steps can use.
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      - name: EXPO_TOKEN not configured
        if: ${{ env.EXPO_TOKEN == '' }}
        run: |
          echo "::warning::EXPO_TOKEN secret is not set - skipping the EAS build/submit."
          echo "Create an access token at https://expo.dev/settings/access-tokens"
          echo "and add it as the EXPO_TOKEN repository secret to enable iOS/Android builds."

      - name: Set up EAS
        if: ${{ env.EXPO_TOKEN != '' }}
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ env.EXPO_TOKEN }}

      # Push to main: production build (no store submit).
      - name: Build production (main)
        if: ${{ env.EXPO_TOKEN != '' && github.event_name == 'push' }}
        run: eas build --platform all --profile production --non-interactive --no-wait

      # Manual: build the chosen profile (preview by default).
      - name: Build (manual)
        if: ${{ env.EXPO_TOKEN != '' && github.event_name == 'workflow_dispatch' && !inputs.submit }}
        run: eas build --platform all --profile ${{ inputs.profile }} --non-interactive --no-wait

      # Manual: submit the latest build for the chosen profile (run after a build finishes).
      - name: Submit latest (manual)
        if: ${{ env.EXPO_TOKEN != '' && github.event_name == 'workflow_dispatch' && inputs.submit }}
        run: eas submit --platform all --profile ${{ inputs.profile }} --non-interactive --latest
