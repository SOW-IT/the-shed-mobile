# EAS builds for iOS + Android.
#
#   - Pull requests          -> `eas build --profile preview`     (internal build, no store submit)
#   - Push to main           -> `eas build --profile production`   (build only, NO store submit)
#   - Manual (workflow_dispatch) -> `eas build --profile production --auto-submit` (build + submit)
#
# Store submission is intentionally manual-only: merging to main never submits.
# Submit a release by running this workflow from the Actions tab ("Run workflow").
#
# One-time setup (see README):
#   1. npx eas init                      - links the repo to an EAS project
#   2. npx eas credentials               - set up Apple + Android signing
#   3. Add an EXPO_TOKEN repo secret     - https://expo.dev/settings/access-tokens
name: EAS Build

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch: # production build + submit, triggered manually

concurrency:
  group: eas-build-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      - name: EXPO_TOKEN not configured
        if: ${{ secrets.EXPO_TOKEN == '' }}
        run: |
          echo "::warning::EXPO_TOKEN secret is not set - skipping the EAS build."
          echo "Create an access token at https://expo.dev/settings/access-tokens"
          echo "and add it as the EXPO_TOKEN repository secret to enable iOS/Android builds."

      - name: Set up EAS
        if: ${{ secrets.EXPO_TOKEN != '' }}
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      # Pull requests: build the preview profile for internal distribution. No store submit.
      - name: Build preview (PR)
        if: ${{ secrets.EXPO_TOKEN != '' && github.event_name == 'pull_request' }}
        run: eas build --platform all --profile preview --non-interactive --no-wait

      # Push to main: build the production profile. No store submit.
      - name: Build production (main)
        if: ${{ secrets.EXPO_TOKEN != '' && github.event_name == 'push' }}
        run: eas build --platform all --profile production --non-interactive --no-wait

      # Manual run: build production and auto-submit to the stores.
      - name: Build + submit production
        if: ${{ secrets.EXPO_TOKEN != '' && github.event_name == 'workflow_dispatch' }}
        run: eas build --platform all --profile production --auto-submit --non-interactive --no-wait
