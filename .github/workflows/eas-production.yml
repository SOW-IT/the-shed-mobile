# Build and submit to production — manual trigger only.
# Run from the Actions tab when you're ready to ship.
name: EAS Production

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Platform(s) to build"
        type: choice
        options: [both, ios, android]
        default: both

permissions:
  contents: read

concurrency:
  group: eas-production
  cancel-in-progress: false

jobs:
  build-production:
    name: Build & submit → Production
    runs-on: ubuntu-latest
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Set up EAS
        uses: expo/expo-github-action@eab7a230208c952974db8c3245cfd78402c7b385 # v9
        with:
          eas-version: latest
          token: ${{ env.EXPO_TOKEN }}

      - name: Resolve platform
        run: |
          platform="${{ inputs.platform || 'both' }}"
          [ "$platform" = "both" ] && platform="all"
          echo "EAS_PLATFORM=$platform" >> "$GITHUB_ENV"

      - name: Build & submit to production
        run: eas build --platform "${{ env.EAS_PLATFORM }}" --profile production --non-interactive --auto-submit
