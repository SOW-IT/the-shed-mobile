# §2 Deep link while signed out → authenticate first, then land on the intended
# screen. Also §0/§11: a visitor deep-linking into a staff-only tab is sent to
# the Org Chart.
appId: ${APP_ID}
tags:
  - auth
---
# Plain launch-fresh keeps whatever session a PRIOR flow left behind
# (Keychain token survives) — use ensure-signed-out to guarantee a visitor
# start, matching 07-org-chart/org-chart.yaml's convention.
- runFlow: ../common/ensure-signed-out.yaml

# Visitor opens a staff-only deep link → bounced to Org Chart (no crash).
# Bottom tabs carry a "<Name>, tab, N of N" accessibilityLabel that masks the
# bare "Org Chart" text (README's bottom-tab convention).
- runFlow:
    file: ../common/open-deeplink.yaml
    env:
      PATH: "?tab=review"
- assertVisible:
    text: ".*Org Chart.*"

# Open a request deep link while signed out, then authenticate → should
# resolve to the intended request focus (not stay on the public app).
# FOCUS_REQUEST_ID isn't seeded in .env/.env.example — without it this opens
# an empty id, which (correctly) resolves as "not found" rather than landing
# on Mine, so this step is best-effort until a real fixture id is provisioned
# (same gap noted in 11-deeplinks/routed-screens.yaml).
- runFlow:
    file: ../common/open-deeplink.yaml
    env:
      PATH: "request/${FOCUS_REQUEST_ID}"
- runFlow:
    file: ../common/sign-in.yaml
    env:
      EMAIL: ${STAFF_EMAIL}
      PASSWORD: ${STAFF_PASSWORD}
- assertVisible:
    text: ".*(Mine|Request not found).*"
