# §7 Org Chart — public tab, year picker, Director card, open a person.
appId: ${APP_ID}
tags:
  - public
---
- runFlow: ../common/ensure-signed-out.yaml
# The bottom tab's a11y label is "Org Chart, tab, N of N" (README's bottom-tab
# convention), not the bare "Org Chart" text.
- assertVisible:
    text: ".*Org Chart.*"

# Director card at the top (or the empty copy).
- assertVisible:
    text: ".*(Director|No Director assigned).*"

# Year picker present when multiple years exist. Its pill has no
# accessibilityLabel at all — the tappable text is just the bare year number
# (e.g. "2026"), not "Select year" (which doesn't exist anywhere).
- tapOn:
    text: "[0-9]{4}"
    optional: true
- tapOn:
    text: "Close"
    optional: true

# Tapping a person opens /person/[email] (read-only when signed out).
- tapOn:
    index: 0
    text: ".*"
    optional: true
- assertNotVisible: "Sign out"        # read-only person view
- assertNotVisible: "Local church"    # private field hidden signed-out
