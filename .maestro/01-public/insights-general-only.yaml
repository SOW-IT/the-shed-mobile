# §1.3 Public Insights — visitor sees only the General segment, no selector FAB.
appId: ${APP_ID}
tags:
  - public
---
- runFlow: ../common/ensure-signed-out.yaml
- tapOn:
    text: ".*Insights, tab.*"
# Attendance is staff-only, so a visitor's tabs array has just one entry
# ("General") — PagerScreen collapses the segment bar entirely when there's
# nothing to switch between, so the literal label "General" never renders.
# Assert the actual General-segment content and the visitor sign-in prompt
# instead (see src/app/(tabs)/insights.tsx's isStaff-gated tabs array). Each
# chart card's wrapping Pressable carries a "<title> — tap to expand"
# accessibilityLabel that masks the child Text on iOS — match that, not the
# bare title (see MetricsCharts.tsx and the same note in 06-insights).
- extendedWaitUntil:
    visible:
      text: ".*All staff.*"
    timeout: 15000
- scrollUntilVisible:
    element:
      text: "Sign in to view more"
    direction: DOWN

# No Attendance segment for visitors.
- assertNotVisible: "Attendance"

# No bottom-right selector FAB in the public General view — its
# accessibilityLabel is "Compare: <value>", not "Select year".
- assertNotVisible:
    text: ".*Compare:.*"
