# §1.1 Home tab — four swipeable pages: Home, Resources, Connect, Partner.
appId: ${APP_ID}
tags:
  - public
  - smoke
---
- runFlow: ../common/ensure-signed-out.yaml
- tapOn:
    text: "Go to Home"

# Home page: mission & values
- assertVisible: "Student Outreach to the World"
- assertVisible: "Our values"

# Swipe to Resources
- swipe:
    direction: LEFT
- assertVisible: "Resources"

# Swipe to Connect (campuses / Weekly Meeting explainer)
- swipe:
    direction: LEFT
- assertVisible: "Connect"
- assertVisible:
    text: ".*Weekly Meeting.*"

# Swipe to Partner (Pray / Give / Volunteer + contact form)
- swipe:
    direction: LEFT
- assertVisible: "Partner"
- assertVisible: "Pray"
- assertVisible: "Give"
- assertVisible: "Volunteer"
