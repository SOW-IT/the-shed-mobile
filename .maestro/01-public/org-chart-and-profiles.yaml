# §1.2 Public Org Chart & profiles.
# - Visitor can browse the chart and open a person profile / service history
# - Signed-out person view hides the Local church field (private)
appId: ${APP_ID}
tags:
  - public
---
- runFlow: ../common/ensure-signed-out.yaml
# Bottom tabs carry a "<Name>, tab, N of N" accessibilityLabel that masks the
# bare "Org Chart" text (README's bottom-tab convention).
- assertVisible:
    text: ".*Org Chart.*"

# Open the first person card in the chart (Director card sits at the top). The
# card carries testID="org-person" (see src/app/(tabs)/org.tsx), so we tap a
# real person row instead of any tappable element.
- tapOn:
    id: "org-person"
    index: 0
    optional: true
- runFlow:
    when:
      notVisible: "Service History"
    commands:
      # Fallback: scroll a person card into view, then actually tap it — so the
      # profile assertions below can only pass when a profile really opened.
      - scrollUntilVisible:
          element:
            id: "org-person"
          direction: DOWN
      - tapOn:
          id: "org-person"
          index: 0

# On a person profile the service history is shown; Local church is hidden when
# signed out.
- assertVisible:
    text: ".*(Service History|Service history).*"
    optional: true
- assertNotVisible: "Local church"
